version: '3'

vars:
  BOILERPLATE_DB_DSN: '{{.BOILERPLATE_DB_DSN | default ""}}'

tasks:
  help:
    desc: print this help message
    cmds:
    - task --list-all
    silent: true

  confirm:
    desc: confirmation prompt
    cmds:
    - |
      echo -n 'Are you sure? [y/N] ' && read ans && [ ${ans:-N} = y ]
    silent: true
    internal: true

  run:
    desc: run the cmd/go-boilerplate application
    cmds:
    - go run ./cmd/go-boilerplate

  migrations:new:
    desc: create a new database migration
    vars:
      NAME: '{{.name | default ""}}'
    cmds:
    - |
      if [ -z "{{.NAME}}" ]; then
        echo "Error: name parameter is required"
        echo "Usage: task migrations:new name=migration_name"
        exit 1
      fi
      echo 'Creating migration file for {{.NAME}}...'
      tern new -m ./internal/database/migrations {{.NAME}}

  migrations:up:
    desc: apply all up database migrations
    deps: [ confirm ]
    cmds:
    - |
      if [ -z "{{.BOILERPLATE_DB_DSN}}" ]; then
        echo "Error: BOILERPLATE_DB_DSN is not set"
        exit 1
      fi
    - echo 'Running up migrations...'
    - tern migrate -m ./internal/database/migrations --conn-string "{{.BOILERPLATE_DB_DSN}}"

  tidy:
    desc: format all .go files, and tidy and vendor module dependencies
    cmds:
    - echo 'Formatting .go files...'
    - go fmt ./...
    - echo 'Tidying module dependencies...'
    - go mod tidy
    - echo 'Verifying dependencies...'
    - go mod verify

  build:
    desc: build the go-boilerplate binary
    cmds:
    - echo 'Building binary...'
    - go build -o ./bin/go-boilerplate ./cmd/go-boilerplate

  test:
    desc: run all tests
    cmds:
    - echo 'Running tests...'
    - go test ./...

  test:cover:
    desc: run all tests with coverage report
    cmds:
    - echo 'Running tests with coverage...'
    - go test -coverprofile=coverage.out ./...
    - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: run golangci-lint
    cmds:
    - echo 'Running linter...'
    - golangci-lint run ./...

  lint:fix:
    desc: run golangci-lint with auto-fix
    cmds:
    - echo 'Running linter with auto-fix...'
    - golangci-lint run --fix ./...